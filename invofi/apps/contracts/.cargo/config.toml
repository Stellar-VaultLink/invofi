[target.wasm32-unknown-unknown]
# Soroban only accepts MVP WebAssembly. On Rust 1.80+, target-cpu=mvp no
# longer reliably strips post-MVP features. Explicitly disable each one.
rustflags = [
    "-C", "target-feature=-reference-types",
    "-C", "target-feature=-bulk-memory",
    "-C", "target-feature=-simd128",
    "-C", "target-feature=-multivalue",
    "-C", "target-feature=-sign-ext",
    "-C", "target-feature=-mutable-globals",
    "-C", "opt-level=z",
]

<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="url(#bg)"/>

  <!-- Document body -->
  <rect x="118" y="90" width="140" height="176" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.5" stroke-width="3"/>

  <!-- Folded corner -->
  <path d="M218 90 L258 90 L258 130 Z" fill="white" fill-opacity="0.08"/>
  <path d="M218 90 L258 130 L218 130 Z" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Invoice lines -->
  <line x1="138" y1="152" x2="238" y2="152" stroke="white" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="172" x2="238" y2="172" stroke="white" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="192" x2="200" y2="192" stroke="white" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>

  <!-- Chain / link badge -->
  <circle cx="252" cy="272" r="46" fill="url(#bg)"/>
  <circle cx="252" cy="272" r="46" fill="url(#accent)" fill-opacity="0.18" stroke="white" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Link icon inside badge -->
  <g transform="translate(252,272)" stroke="white" stroke-width="5" stroke-linecap="round" fill="none">
    <!-- left link -->
    <path d="M-22,-8 L-10,-8 A10,10 0 0 1 -10,8 L-22,8 A10,10 0 0 1 -22,-8Z" stroke-linejoin="round"/>
    <!-- right link -->
    <path d="M22,-8 L10,-8 A10,10 0 0 0 10,8 L22,8 A10,10 0 0 0 22,-8Z" stroke-linejoin="round"/>
    <!-- connector -->
    <line x1="-10" y1="0" x2="10" y2="0"/>
  </g>

  <!-- "IF" wordmark at bottom -->
  <text x="200" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" fill-opacity="0.9" text-anchor="middle" letter-spacing="4">InvoFi</text>
</svg>

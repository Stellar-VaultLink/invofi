[target.wasm32-unknown-unknown]
# Soroban only accepts baseline MVP WebAssembly.
# "reference-types", "bulk-memory", and other post-MVP features cause:
#   HostError: Error(WasmVm, InvalidAction) / "reference-types not enabled"
# This mirrors what `stellar contract build` sets automatically via RUSTFLAGS.
rustflags = [
    "-C", "target-cpu=mvp",
    "-C", "opt-level=z",
]

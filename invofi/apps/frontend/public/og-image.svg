<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="55%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="120" r="220" fill="white" fill-opacity="0.04"/>
  <circle cx="1050" cy="120" r="140" fill="white" fill-opacity="0.04"/>

  <!-- Decorative circle bottom-left -->
  <circle cx="150" cy="530" r="160" fill="white" fill-opacity="0.04"/>

  <!-- Logo mark — stylised invoice/chain icon -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="64" height="80" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="12" y1="24" x2="52" y2="24" stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="38" x2="52" y2="38" stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="52" x2="36" y2="52" stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
    <!-- Chain link -->
    <circle cx="58" cy="68" r="14" fill="#60a5fa" stroke="white" stroke-width="2"/>
    <path d="M53 68 Q58 62 63 68 Q58 74 53 68Z" fill="white" fill-opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" letter-spacing="-2">InvoFi</text>

  <!-- Tagline -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="white" fill-opacity="0.75">Decentralized Invoice Financing on Stellar Soroban</text>

  <!-- Pill badges -->
  <rect x="100" y="436" width="160" height="36" rx="18" fill="white" fill-opacity="0.15"/>
  <text x="180" y="459" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">⚡ Instant Liquidity</text>

  <rect x="276" y="436" width="148" height="36" rx="18" fill="white" fill-opacity="0.15"/>
  <text x="350" y="459" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">🔗 On-Chain</text>

  <rect x="440" y="436" width="148" height="36" rx="18" fill="white" fill-opacity="0.15"/>
  <text x="514" y="459" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">🌍 Permissionless</text>

  <!-- URL -->
  <text x="100" y="558" font-family="system-ui, sans-serif" font-size="22" fill="white" fill-opacity="0.5">invofi-five.vercel.app</text>

  <!-- Right panel — mock card -->
  <rect x="780" y="160" width="340" height="200" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="808" y="202" font-family="system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.5" font-weight="600" letter-spacing="1">INVOICE #INV-0042</text>
  <text x="808" y="238" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">$48,500 USDC</text>
  <line x1="808" y1="258" x2="1100" y2="258" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="808" y="286" font-family="system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.5">Interest rate</text>
  <text x="808" y="308" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#86efac">8.5% APR</text>
  <text x="980" y="286" font-family="system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.5">Due date</text>
  <text x="980" y="308" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white">30 days</text>
  <rect x="808" y="326" width="140" height="18" rx="4" fill="#22c55e" fill-opacity="0.2"/>
  <text x="878" y="339" font-family="system-ui, sans-serif" font-size="12" fill="#86efac" text-anchor="middle" font-weight="600">● FINANCED</text>

  <rect x="780" y="386" width="160" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="860" y="420" font-family="system-ui, sans-serif" font-size="12" fill="white" fill-opacity="0.5" text-anchor="middle">Total Volume</text>
  <text x="860" y="450" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">$2.4M</text>

  <rect x="960" y="386" width="160" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="1040" y="420" font-family="system-ui, sans-serif" font-size="12" fill="white" fill-opacity="0.5" text-anchor="middle">Active Lenders</text>
  <text x="1040" y="450" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">340</text>

  <!-- Stellar badge bottom right -->
  <text x="1100" y="600" font-family="system-ui, sans-serif" font-size="14" fill="white" fill-opacity="0.35" text-anchor="end">Built on Stellar Soroban</text>
</svg>
